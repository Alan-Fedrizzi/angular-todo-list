<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title> Todo </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="home ion-no-padding">
  <ion-grid class="home__grid ion-no-padding">
    <ion-col>
      <ion-row>
        <app-todo-add class="home__todo"></app-todo-add>
      </ion-row>
      <ion-row>
        <app-todo-list class="home__todo" [todos]="todos"></app-todo-list>
      </ion-row>
    </ion-col>
  </ion-grid>
  <ion-button (click)="fetchData('aprovacao')">fetch data from wp</ion-button>
  <img
    src="http://institucional-medgrupo-wp.local/wp-content/uploads/2023/08/video-1.png"
    alt=""
  />
</ion-content>
